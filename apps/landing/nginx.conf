server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://plausible.io https://app.ventra.uz; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SEO headers
    add_header X-Robots-Tag "index, follow" always;
    add_header Vary "Accept-Language" always;

    # Cache static assets (content-hashed by Vite)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Cache public files
    location ~* \.(ico|png|jpg|jpeg|webp|woff2|woff)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # sitemap and robots — short cache
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Prerendered HTML — crawlers get fresh content
    location = /index.html {
        add_header Cache-Control "public, max-age=3600";
        add_header Link '<https://ventra.uz/>; rel="canonical"' always;
        add_header X-Robots-Tag "index, follow" always;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
