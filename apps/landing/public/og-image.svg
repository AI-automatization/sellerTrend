  <!-- Floating badge: Score -->
  <g transform="translate(1080, 160)">
    <rect width="80" height="60" rx="12" fill="#0f1029" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="40" y="28" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5" text-anchor="middle">Score</text>
    <text x="40" y="50" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="20" fill="#2E5BFF" text-anchor="middle">9.2</text>
  </g>

  <!-- URL at bottom -->
  <text x="600" y="590" font-family="'Inter', Arial, sans-serif" font-weight="500" font-size="16" fill="#ffffff" opacity="0.3" text-anchor="middle">ventra.uz</text>
