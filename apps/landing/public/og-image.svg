<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f1029"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E5BFF"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow1" cx="30%" cy="40%" r="40%" fx="30%" fy="40%">
      <stop offset="0%" style="stop-color:#2E5BFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2E5BFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" cx="70%" cy="60%" r="35%" fx="70%" fy="60%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glows -->
  <circle cx="360" cy="250" r="300" fill="url(#glow1)"/>
  <circle cx="840" cy="400" r="250" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Logo icon -->
  <rect x="80" y="220" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="108" y="258" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#fff" text-anchor="middle">V</text>

  <!-- Brand name -->
  <text x="152" y="258" font-family="'Space Grotesk', Arial, sans-serif" font-weight="800" font-size="44" fill="#fff">VENTRA</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="'Inter', Arial, sans-serif" font-weight="600" font-size="32" fill="#fff">Uzum.uz sotuvchilari uchun</text>
  <text x="80" y="365" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="36" fill="url(#accent)">AI Analytics Platforma</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="18" fill="#ffffff" opacity="0.5">Trend topish  |  Raqib kuzatuvi  |  Sourcing  |  AI tahlil</text>

  <!-- Stats row -->
  <g transform="translate(80, 460)">
    <rect width="140" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="70" y="30" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="22" fill="#2E5BFF" text-anchor="middle">1000+</text>
    <text x="70" y="52" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Sotuvchilar</text>
  </g>
  <g transform="translate(240, 460)">
    <rect width="140" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="70" y="30" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="22" fill="#7C3AED" text-anchor="middle">50K+</text>
    <text x="70" y="52" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Mahsulotlar</text>
  </g>
  <g transform="translate(400, 460)">
    <rect width="140" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="70" y="30" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="22" fill="#06B6D4" text-anchor="middle">10x</text>
    <text x="70" y="52" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">ROI o'sishi</text>
  </g>

  <!-- Dashboard mockup (right side) -->
  <g transform="translate(650, 130)">
    <!-- Card frame -->
    <rect width="470" height="370" rx="16" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>

    <!-- Browser bar -->
    <rect x="0" y="0" width="470" height="36" rx="16" fill="#ffffff" opacity="0.03"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.6"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.6"/>
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.6"/>
    <rect x="70" y="10" width="200" height="16" rx="8" fill="#ffffff" opacity="0.05"/>
    <text x="110" y="22" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" opacity="0.3">app.ventra.uz</text>

    <!-- KPI cards -->
    <g transform="translate(16, 50)">
      <rect width="103" height="52" rx="8" fill="#ffffff" opacity="0.05"/>
      <text x="12" y="22" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.4">Mahsulotlar</text>
      <text x="12" y="42" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="18" fill="#2E5BFF">247</text>
    </g>
    <g transform="translate(127, 50)">
      <rect width="103" height="52" rx="8" fill="#ffffff" opacity="0.05"/>
      <text x="12" y="22" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.4">Score avg</text>
      <text x="12" y="42" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="18" fill="#28c840">8.4</text>
    </g>
    <g transform="translate(238, 50)">
      <rect width="103" height="52" rx="8" fill="#ffffff" opacity="0.05"/>
      <text x="12" y="22" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.4">Trend</text>
      <text x="12" y="42" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="18" fill="#febc2e">+32%</text>
    </g>
    <g transform="translate(349, 50)">
      <rect width="103" height="52" rx="8" fill="#ffffff" opacity="0.05"/>
      <text x="12" y="22" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.4">Signal</text>
      <text x="12" y="42" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="18" fill="#ff5f57">14</text>
    </g>

    <!-- Chart bars -->
    <g transform="translate(16, 120)">
      <rect width="438" height="160" rx="8" fill="#ffffff" opacity="0.03"/>
      <rect x="16" y="100" width="26" height="45" rx="3" fill="url(#accent)" opacity="0.5"/>
      <rect x="52" y="70" width="26" height="75" rx="3" fill="url(#accent)" opacity="0.55"/>
      <rect x="88" y="85" width="26" height="60" rx="3" fill="url(#accent)" opacity="0.6"/>
      <rect x="124" y="40" width="26" height="105" rx="3" fill="url(#accent)" opacity="0.65"/>
      <rect x="160" y="60" width="26" height="85" rx="3" fill="url(#accent)" opacity="0.7"/>
      <rect x="196" y="25" width="26" height="120" rx="3" fill="url(#accent)" opacity="0.75"/>
      <rect x="232" y="50" width="26" height="95" rx="3" fill="url(#accent)" opacity="0.8"/>
      <rect x="268" y="30" width="26" height="115" rx="3" fill="url(#accent)" opacity="0.85"/>
      <rect x="304" y="15" width="26" height="130" rx="3" fill="url(#accent)" opacity="0.9"/>
      <rect x="340" y="45" width="26" height="100" rx="3" fill="url(#accent)" opacity="0.85"/>
      <rect x="376" y="22" width="26" height="123" rx="3" fill="url(#accent)" opacity="0.9"/>
    </g>

    <!-- Table row -->
    <g transform="translate(16, 296)">
      <rect width="438" height="56" rx="8" fill="#ffffff" opacity="0.03"/>
      <rect x="12" y="14" width="28" height="28" rx="6" fill="url(#accent)" opacity="0.5"/>
      <rect x="52" y="16" width="160" height="10" rx="5" fill="#ffffff" opacity="0.1"/>
      <rect x="52" y="32" width="100" height="8" rx="4" fill="#ffffff" opacity="0.05"/>
      <text x="400" y="34" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#28c840" text-anchor="end">+24%</text>
    </g>
