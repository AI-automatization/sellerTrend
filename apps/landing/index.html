    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" />

    </noscript>

    <!-- L-016: JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VENTRA",
      "description": "Uzum.uz sotuvchilari uchun premium AI analytics platforma",
      "url": "https://ventra.uz",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Windows, macOS",
      "offers": [
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "0",
          "priceCurrency": "UZS"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "99000",
          "priceCurrency": "UZS"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "120"
      }
    }
    </script>

    <!-- L-018: Theme detection before render (no flash) -->
    <script>
      (function() {
        var stored = localStorage.getItem('ventra-landing-theme');
        if (stored === 'light') {
          document.documentElement.setAttribute('data-theme', 'ventra-light');
        } else if (!stored) {
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (!prefersDark) {
            document.documentElement.setAttribute('data-theme', 'ventra-light');
            localStorage.setItem('ventra-landing-theme', 'light');
          }
        }
      })();
    </script>
  </head>
  <body>
