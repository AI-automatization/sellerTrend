name: Claude PR Review

# PR ochilganda yoki yangilanganda avtomatik code review
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Faqat auto-generated EMAS PR larni review qilish (loop oldini olish)
    if: "!contains(github.event.pull_request.labels.*.name, 'auto-generated')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff stats
        id: diff_stats
        run: |
          FILES_CHANGED=$(git diff origin/main...HEAD --name-only | wc -l)
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

      - name: Claude Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(git diff origin/main...HEAD)
          FILES=$(git diff origin/main...HEAD --name-only)

          REVIEW=$(claude -p "
          Sen VENTRA loyihasining QA Agent isan. PR ni review qil.

          O'ZGARGAN FAYLLAR:
          $FILES

          DIFF:
          $DIFF

          VENTRA QOIDALARI:
          1. any type TAQIQLANGAN (TypeScript strict)
          2. HAR DB query da account_id filter SHART
          3. BigInt → .toString() MAJBURIY
          4. console.log TAQIQLANGAN (NestJS Logger ishlatish)
          5. Max 400 qator per fayl
          6. Inline styles TAQIQLANGAN (Tailwind)
          7. Magic number TAQIQLANGAN (const bilan nomlash)
          8. Nested try/catch TAQIQLANGAN
          9. i18n: har matn useI18n + t() orqali
          10. weekly_bought = snapshot DELTA (ordersAmount farqi)
          11. rOrdersAmount = rounded JAMI (haftalik EMAS!)
          12. availableAmount = per-order limit (stok EMAS)
          13. totalAvailableAmount = haqiqiy ombor stoki

          TEKSHIR:
          1. TypeScript strict mode buzilganmi? (any, as any, @ts-ignore)
          2. Security: SQL injection, XSS, hardcoded secret
          3. Performance: N+1 query, unbounded findMany (LIMIT yo'q), loop ichida await
          4. account_id filter yo'qmi? (multi-tenant buzilishi)
          5. BigInt serialize bo'lmaganmi?
          6. Error handling: catch da error swallow qilinganmi?
          7. Zone buzilishi: Backend fayl Frontend da import qilinganmi?

          FORMAT (aynan shu formatda yoz):
          ## Review Summary
          **Verdict:** APPROVE | CHANGES_REQUESTED | COMMENT
          **Risk:** LOW | MEDIUM | HIGH

          ### Issues (agar bor bo'lsa)
          | Severity | File | Line | Issue |
          |----------|------|------|-------|

          ### Suggestions
          - suggestion 1
          - suggestion 2

          ### Good
          - positive feedback

          Agar hech qanday muammo topmasang, qisqa APPROVE yoz.
          " --output-format text --max-tokens 1500 2>/dev/null || echo "Claude review failed — check API key")

          # Multi-line output uchun
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "review<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        if: steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            const filesChanged = `${{ steps.diff_stats.outputs.files_changed }}`;

            const body = [
              `## Claude Code Review`,
              ``,
              `> ${filesChanged} file(s) changed`,
              ``,
              review,
              ``,
              `---`,
              `*Generated by VENTRA Claude QA Agent*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
